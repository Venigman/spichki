<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#cdc6b6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Спички">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Спички</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
  }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    background: #cdc6b6;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    position: fixed;
    inset: 0;
  }

  /* Marble background — layered SVG */
  .marble {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .stage {
    position: fixed;
    inset: 0;
    z-index: 1;
    overflow: hidden;
    /* respect safe areas */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .match {
    position: absolute;
    top: 0;
    left: 0;
    width: 7px;
    height: 96px;
    transform: translate3d(0, 0, 0);
    transition: transform 520ms cubic-bezier(0.22, 1, 0.36, 1);
    will-change: transform;
    touch-action: none;
    cursor: grab;
  }
  .match.dragging {
    transition: none;
    cursor: grabbing;
    z-index: 50;
  }

  .match-body {
    position: absolute;
    left: 0;
    right: 0;
    top: 9px;
    bottom: 0;
    background:
      linear-gradient(180deg,
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0) 6%,
        rgba(0,0,0,0) 80%,
        rgba(0,0,0,0.12) 100%),
      linear-gradient(90deg,
        #b89360 0%,
        #d6b685 22%,
        #e6cba0 50%,
        #c79f6c 78%,
        #8e6c40 100%);
    border-radius: 1.5px;
    box-shadow:
      0 1px 1.5px rgba(40, 25, 10, 0.28),
      inset 0 0 0 0.5px rgba(80, 50, 20, 0.25);
  }
  /* faint wood grain */
  .match-body::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      repeating-linear-gradient(180deg,
        rgba(80, 50, 20, 0) 0px,
        rgba(80, 50, 20, 0) 8px,
        rgba(80, 50, 20, 0.06) 9px,
        rgba(80, 50, 20, 0) 11px);
    pointer-events: none;
  }

  .match-head {
    position: absolute;
    top: 0;
    left: -3px;
    right: -3px;
    height: 16px;
    background:
      radial-gradient(ellipse at 30% 28%,
        #a3c269 0%,
        #6a9038 28%,
        #3e6322 65%,
        #213d11 100%);
    border-radius: 50% 50% 38% 38% / 62% 62% 38% 38%;
    box-shadow:
      0 1px 2px rgba(20, 30, 5, 0.4),
      inset 0 1px 0 rgba(255, 255, 255, 0.18);
  }
  /* speckle on the head */
  .match-head::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background-image:
      radial-gradient(circle at 60% 70%, rgba(0,0,0,0.18) 0.5px, transparent 1.2px),
      radial-gradient(circle at 25% 60%, rgba(255,255,255,0.15) 0.4px, transparent 1px),
      radial-gradient(circle at 70% 30%, rgba(0,0,0,0.12) 0.4px, transparent 1px);
    background-size: 6px 6px, 5px 5px, 7px 7px;
    pointer-events: none;
  }

  /* Discreet reset dot — top-left corner */
  .reset {
    position: fixed;
    top: calc(env(safe-area-inset-top) + 10px);
    left: 12px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(70, 55, 35, 0.16);
    z-index: 100;
    transition: background 220ms ease, transform 220ms ease;
    cursor: pointer;
  }
  .reset.armed {
    background: radial-gradient(circle, #8c2a22 0%, #5a1810 100%);
    transform: scale(1.6);
    transition: background 1.2s linear, transform 1.2s ease-out;
  }

  @media (prefers-reduced-motion: reduce) {
    .match { transition-duration: 0ms; }
  }
</style>
</head>
<body>

<svg class="marble" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dcd5c5"/>
      <stop offset="0.45" stop-color="#c9c1ac"/>
      <stop offset="1" stop-color="#bdb39c"/>
    </linearGradient>
    <radialGradient id="warm" cx="0.7" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#e8dcc2" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#e8dcc2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool" cx="0.15" cy="0.85" r="0.85">
      <stop offset="0" stop-color="#9b9484" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#9b9484" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.4
                              0 0 0 0 0.36
                              0 0 0 0 0.28
                              0 0 0 0.06 0"/>
    </filter>
    <filter id="veinWarp">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="42"/>
    </filter>
    <filter id="veinSoft">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="400" height="800" fill="url(#base)"/>
  <rect width="400" height="800" fill="url(#warm)"/>
  <rect width="400" height="800" fill="url(#cool)"/>

  <g filter="url(#veinWarp)" opacity="0.35">
    <path d="M -20 120 C 80 100, 180 220, 280 180 S 460 260, 520 200"
          stroke="#7a6e58" stroke-width="0.8" fill="none"/>
    <path d="M -20 380 C 100 360, 220 440, 320 410 S 480 470, 540 430"
          stroke="#6e6452" stroke-width="0.6" fill="none"/>
    <path d="M -20 600 C 90 580, 170 660, 290 640 S 460 700, 540 670"
          stroke="#86795f" stroke-width="0.7" fill="none"/>
    <path d="M -20 240 C 110 280, 220 250, 320 290 S 480 320, 540 300"
          stroke="#9a8e74" stroke-width="0.4" fill="none"/>
    <path d="M -20 500 C 80 520, 200 480, 300 530 S 460 540, 540 510"
          stroke="#5e553f" stroke-width="0.45" fill="none"/>
  </g>

  <g filter="url(#veinSoft)" opacity="0.18">
    <path d="M 60 0 C 80 200, 40 400, 90 600 S 60 800, 80 800"
          stroke="#fff8e8" stroke-width="1.2" fill="none"/>
    <path d="M 320 0 C 300 180, 360 380, 310 580 S 340 800, 320 800"
          stroke="#fff8e8" stroke-width="0.9" fill="none"/>
  </g>

  <rect width="400" height="800" filter="url(#grain)" opacity="0.55"/>
</svg>

<div class="stage" id="stage"></div>
<div class="reset" id="reset" aria-label="Сброс (удерживай)"></div>

<script>
(() => {
  "use strict";

  const TOTAL = 25;
  const PILE_SIZE = 5;
  const PILES = 5;
  const MATCH_W = 7;
  const MATCH_H = 96;
  const VISIBLE = 46;       // visible portion at edges
  const PILE_GAP = 24;      // gap between piles
  const SWIPE_THRESHOLD = 36;
  const STORAGE_KEY = "spichki_v1";
  const TTL_MS = 24 * 60 * 60 * 1000;

  const stage = document.getElementById("stage");
  const resetBtn = document.getElementById("reset");

  let viewW = window.innerWidth;
  let viewH = window.innerHeight;
  let thrownUp = [];           // array of match IDs in throw order
  const matches = [];          // [{ id, el }]

  // ---------- persistence ----------
  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return [];
      const data = JSON.parse(raw);
      if (!data || typeof data.t !== "number") return [];
      if (Date.now() - data.t > TTL_MS) {
        localStorage.removeItem(STORAGE_KEY);
        return [];
      }
      if (!Array.isArray(data.up)) return [];
      return data.up.filter(n => Number.isInteger(n) && n >= 0 && n < TOTAL);
    } catch (e) {
      return [];
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        up: thrownUp,
        t: Date.now()
      }));
    } catch (e) { /* quota / private mode — ignore */ }
  }

  // ---------- geometry ----------
  function bottomPos(id) {
    const totalW = TOTAL * MATCH_W;
    const startX = (viewW - totalW) / 2;
    return {
      x: startX + id * MATCH_W,
      y: viewH - VISIBLE
    };
  }

  function topPos(orderIdx) {
    const pile = Math.floor(orderIdx / PILE_SIZE);
    const inPile = orderIdx % PILE_SIZE;
    const pileW = PILE_SIZE * MATCH_W;
    const totalW = PILES * pileW + (PILES - 1) * PILE_GAP;
    const startX = (viewW - totalW) / 2;
    return {
      x: startX + pile * (pileW + PILE_GAP) + inPile * MATCH_W,
      y: -MATCH_H + VISIBLE
    };
  }

  function posFor(id) {
    const idx = thrownUp.indexOf(id);
    return idx >= 0 ? topPos(idx) : bottomPos(id);
  }

  function applyTransform(el, x, y) {
    el.style.transform = `translate3d(${x}px, ${y}px, 0)`;
  }

  // ---------- rendering ----------
  function buildMatches() {
    const frag = document.createDocumentFragment();
    for (let i = 0; i < TOTAL; i++) {
      const el = document.createElement("div");
      el.className = "match";
      el.dataset.id = String(i);
      el.innerHTML = '<div class="match-body"></div><div class="match-head"></div>';
      attachSwipe(el, i);
      matches.push({ id: i, el });
      frag.appendChild(el);
    }
    stage.appendChild(frag);
  }

  function layoutAll(animate) {
    for (const m of matches) {
      if (!animate) m.el.style.transition = "none";
      const p = posFor(m.id);
      applyTransform(m.el, p.x, p.y);
    }
    if (!animate) {
      // force reflow, then restore transitions
      void stage.offsetHeight;
      for (const m of matches) m.el.style.transition = "";
    }
  }

  // ---------- interaction ----------
  function throwUp(id) {
    if (thrownUp.includes(id)) return;
    thrownUp.push(id);
    saveState();
    layoutAll(true);
    haptic(8);
  }

  function throwDown(id) {
    const idx = thrownUp.indexOf(id);
    if (idx < 0) return;
    thrownUp.splice(idx, 1);
    saveState();
    layoutAll(true);
    haptic(8);
  }

  function attachSwipe(el, id) {
    let startX = 0, startY = 0, dy = 0, dx = 0, active = false, pid = null;

    function onDown(e) {
      if (e.cancelable) e.preventDefault();
      const t = e.touches ? e.touches[0] : e;
      pid = e.pointerId != null ? e.pointerId : null;
      startX = t.clientX;
      startY = t.clientY;
      dy = 0; dx = 0;
      active = true;
      el.classList.add("dragging");
      if (el.setPointerCapture && pid != null) {
        try { el.setPointerCapture(pid); } catch (_) {}
      }
    }

    function onMove(e) {
      if (!active) return;
      const t = e.touches ? e.touches[0] : e;
      dx = t.clientX - startX;
      dy = t.clientY - startY;

      const isUp = thrownUp.includes(id);
      let allowedDy = dy;
      // matches at bottom can only be dragged upward
      if (!isUp) allowedDy = Math.min(0, dy);
      // matches in piles can only be dragged downward
      else allowedDy = Math.max(0, dy);

      const base = posFor(id);
      // small horizontal follow for tactile feel, but capped
      const followX = Math.max(-6, Math.min(6, dx * 0.15));
      applyTransform(el, base.x + followX, base.y + allowedDy);
    }

    function onUp(e) {
      if (!active) return;
      active = false;
      el.classList.remove("dragging");
      if (el.releasePointerCapture && pid != null) {
        try { el.releasePointerCapture(pid); } catch (_) {}
      }

      const isUp = thrownUp.includes(id);
      const verticalIntent = Math.abs(dy) > Math.abs(dx) * 0.8;

      if (!isUp && verticalIntent && dy < -SWIPE_THRESHOLD) {
        throwUp(id);
      } else if (isUp && verticalIntent && dy > SWIPE_THRESHOLD) {
        throwDown(id);
      } else {
        // snap back
        const base = posFor(id);
        applyTransform(el, base.x, base.y);
      }
      pid = null;
    }

    if (window.PointerEvent) {
      el.addEventListener("pointerdown", onDown);
      el.addEventListener("pointermove", onMove);
      el.addEventListener("pointerup", onUp);
      el.addEventListener("pointercancel", onUp);
    } else {
      el.addEventListener("touchstart", onDown, { passive: false });
      el.addEventListener("touchmove", onMove, { passive: false });
      el.addEventListener("touchend", onUp);
      el.addEventListener("touchcancel", onUp);
      el.addEventListener("mousedown", onDown);
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
    }
  }

  // ---------- reset (long press) ----------
  let resetTimer = null;
  function startReset(e) {
    if (e && e.cancelable) e.preventDefault();
    resetBtn.classList.add("armed");
    resetTimer = setTimeout(() => {
      thrownUp = [];
      saveState();
      layoutAll(true);
      haptic(30);
      resetBtn.classList.remove("armed");
    }, 1400);
  }
  function cancelReset() {
    clearTimeout(resetTimer);
    resetTimer = null;
    resetBtn.classList.remove("armed");
  }
  if (window.PointerEvent) {
    resetBtn.addEventListener("pointerdown", startReset);
    resetBtn.addEventListener("pointerup", cancelReset);
    resetBtn.addEventListener("pointerleave", cancelReset);
    resetBtn.addEventListener("pointercancel", cancelReset);
  } else {
    resetBtn.addEventListener("touchstart", startReset, { passive: false });
    resetBtn.addEventListener("touchend", cancelReset);
    resetBtn.addEventListener("touchcancel", cancelReset);
    resetBtn.addEventListener("mousedown", startReset);
    resetBtn.addEventListener("mouseup", cancelReset);
    resetBtn.addEventListener("mouseleave", cancelReset);
  }

  // ---------- haptics ----------
  function haptic(ms) {
    if (navigator.vibrate) {
      try { navigator.vibrate(ms); } catch (_) {}
    }
  }

  // ---------- viewport ----------
  function onResize() {
    viewW = window.innerWidth;
    viewH = window.innerHeight;
    layoutAll(false);
  }
  window.addEventListener("resize", onResize);
  window.addEventListener("orientationchange", onResize);

  // prevent pull-to-refresh / overscroll
  document.addEventListener("touchmove", (e) => {
    if (e.cancelable) e.preventDefault();
  }, { passive: false });

  // ---------- boot ----------
  thrownUp = loadState();
  buildMatches();
  layoutAll(false);

  // service worker
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => {});
    });
  }
})();
</script>
</body>
</html>
